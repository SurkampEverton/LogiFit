name: security

# Pipeline de supply chain (regra 35 + ADR 0073). Roda em PR + push em main +
# scheduled (segunda 05:00 UTC). Faixa 3 do Sprint 00.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 5 * * 1'

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'

jobs:
  gitleaks:
    name: gitleaks (secret scanning)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: '.gitleaks.toml'

  osv-scanner:
    name: osv-scanner (vulnerable deps)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          scan-args: |-
            --recursive
            --skip-git
            ./
